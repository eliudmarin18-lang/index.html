<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Gallina PRO 🐔</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:linear-gradient(#87CEEB 70%, #4CAF50 30%);
    overflow:hidden;
    font-family:Arial;
}

/* CONTENEDOR */
.gallina{
    position:relative;
    width:220px;
    height:180px;
    animation:mover 2s infinite alternate ease-in-out;
}

/* CUERPO */
.cuerpo{
    width:140px;
    height:100px;
    background:#fff;
    border-radius:60% 60% 50% 50%;
    position:absolute;
    top:50px;
    left:50px;
    box-shadow: inset -5px -5px 0 #eaeaea;
}

/* CABEZA */
.cabeza{
    width:60px;
    height:60px;
    background:#fff;
    border-radius:50%;
    position:absolute;
    top:20px;
    left:10px;
    box-shadow: inset -3px -3px 0 #eaeaea;
}

/* CRESTA */
.cresta{
    position:absolute;
    top:-10px;
    left:15px;
    width:30px;
    height:20px;
    background:red;
    border-radius:50%;
    box-shadow:15px 0 red, 30px 0 red;
}

/* OJO */
.ojo{
    width:10px;
    height:10px;
    background:black;
    border-radius:50%;
    position:absolute;
    top:25px;
    left:20px;
}

/* PICO */
.pico{
    position:absolute;
    top:30px;
    left:-10px;
    width:0;
    height:0;
    border-left:15px solid orange;
    border-top:8px solid transparent;
    border-bottom:8px solid transparent;
}

/* ALA */
.ala{
    width:60px;
    height:50px;
    background:#f5f5f5;
    border-radius:50%;
    position:absolute;
    top:80px;
    left:80px;
    box-shadow: inset -3px -3px 0 #ddd;
}

/* COLA */
.cola{
    position:absolute;
    top:50px;
    right:0;
    width:50px;
    height:50px;
}

.cola div{
    width:30px;
    height:30px;
    background:#fff;
    border-radius:50%;
    position:absolute;
}

.cola div:nth-child(1){ right:0; top:0; }
.cola div:nth-child(2){ right:10px; top:10px; }
.cola div:nth-child(3){ right:20px; top:0; }

/* PATAS */
.pata{
    width:6px;
    height:35px;
    background:orange;
    position:absolute;
    bottom:10px;
}

.pata1{ left:90px; }
.pata2{ left:120px; }

/* PIES */
.pata::after{
    content:"";
    position:absolute;
    bottom:-5px;
    left:-8px;
    width:20px;
    height:5px;
    background:orange;
    border-radius:5px;
}

/* HUEVO */
.huevo{
    position:absolute;
    font-size:40px;
    right:15px;
    top:80px;
    opacity:0;
    cursor:pointer;
    transition:1s;
}

/* SALE DE LA COLA */
.salir{
    transform:translateX(40px) translateY(30px);
    opacity:1;
}

/* POLLITO */
.pollito{
    font-size:90px;
    display:none;
    margin-top:20px;
    animation:pop 1s ease;
}

@keyframes pop{
    from{transform:scale(0);}
    to{transform:scale(1);}
}

/* MENSAJE */
.mensaje{
    display:none;
    font-size:30px;
    color:white;
    text-shadow:2px 2px 5px black;
}

/* MOVIMIENTO */
@keyframes mover{
    from{transform:translateX(-20px);}
    to{transform:translateX(20px);}
}
</style>

</head>
<body>

<div class="gallina">

    <div class="cuerpo"></div>

    <div class="cabeza">
        <div class="cresta"></div>
        <div class="ojo"></div>
        <div class="pico"></div>
    </div>

    <div class="ala"></div>

    <div class="cola">
        <div></div>
        <div></div>
        <div></div>
    </div>

    <div class="pata pata1"></div>
    <div class="pata pata2"></div>

    <div class="huevo" id="huevo" onclick="romper()">🥚</div>

</div>

<div class="pollito" id="pollito">🐣</div>
<div class="mensaje" id="mensaje">Te amo berrinches 💛</div>

<script>
setTimeout(()=>{
    document.getElementById("huevo").classList.add("salir");
},2000);

function romper(){
    document.getElementById("huevo").style.display="none";
    document.getElementById("pollito").style.display="block";
    document.getElementById("mensaje").style.display="block";
}
</script>

</body>
</html>
