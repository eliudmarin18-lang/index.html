<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Pregunta importante 💖</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4);
    overflow:hidden;
    text-align:center;
}

h1{
    color:#fff;
    text-shadow:2px 2px 5px rgba(0,0,0,0.3);
}

#contenedor{
    position:relative;
}

button{
    padding:15px 30px;
    font-size:20px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    margin:10px;
    transition:0.3s;
}

#si{
    background:#4CAF50;
    color:white;
}

#no{
    background:#f44336;
    color:white;
    position:absolute;
}

#final{
    display:none;
    color:white;
    animation:fadeIn 1s ease;
}

.flor{
    font-size:120px;
    animation:flotar 2s infinite ease-in-out;
}

@keyframes flotar{
    0%{transform:translateY(0);}
    50%{transform:translateY(-20px);}
    100%{transform:translateY(0);}
}

@keyframes fadeIn{
    from{opacity:0;}
    to{opacity:1;}
}

/* Confeti */
.confeti{
    position:fixed;
    width:10px;
    height:10px;
    background:red;
    top:-10px;
    animation:caer 3s linear infinite;
}

@keyframes caer{
    to{
        transform:translateY(100vh) rotate(360deg);
    }
}
</style>

</head>
<body>

<div id="contenedor">
    <h1>¿Quieres regresar conmigo? 💖</h1>
    
    <button id="si">Sí 💘</button>
    <button id="no">No 😒</button>
</div>

<div id="final">
    <h1>No que no aceptabas chaparra 🌸</h1>
    <div class="flor">🌸</div>
    <br><br>
    <button onclick="compartir()">Compartir 😎</button>
</div>

<script>
let tamaño = 1;

// Botón NO que se mueve
const noBtn = document.getElementById("no");

noBtn.addEventListener("mouseover", () => {
    let x = Math.random() * (window.innerWidth - 100);
    let y = Math.random() * (window.innerHeight - 50);
    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
});

// También se mueve al hacer clic
noBtn.addEventListener("click", () => {
    tamaño += 0.5;

    let botonSi = document.getElementById("si");
    botonSi.style.transform = "scale(" + tamaño + ")";

    if(tamaño >= 5){
        botonSi.style.position = "fixed";
        botonSi.style.top = "0";
        botonSi.style.left = "0";
        botonSi.style.width = "100vw";
        botonSi.style.height = "100vh";
        botonSi.style.fontSize = "60px";
    }
});

// Botón SI
document.getElementById("si").addEventListener("click", () => {
    document.getElementById("contenedor").style.display = "none";
    document.getElementById("final").style.display = "block";
    lanzarConfeti();
});

// Confeti 🎉
function lanzarConfeti(){
    for(let i=0; i<50; i++){
        let confeti = document.createElement("div");
        confeti.classList.add("confeti");

        confeti.style.left = Math.random() * 100 + "vw";
        confeti.style.background = `hsl(${Math.random()*360},100%,50%)`;
        confeti.style.animationDuration = (Math.random()*3+2)+"s";

        document.body.appendChild(confeti);
    }
}

// Compartir
function compartir(){
    if(navigator.share){
        navigator.share({
            title: 'Mira esto 😆',
            text: 'Me aceptó 😂',
            url: window.location.href
        });
    } else {
        navigator.clipboard.writeText(window.location.href);
        alert("Link copiado 😎, compártelo donde quieras");
    }
}
</script>

</body>
</html>0
